version: "3.8"

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./backend:/app/backend
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    image: python:3.11-slim
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    working_dir: /app
    command: python3 -m http.server 3000
    depends_on:
      - backend